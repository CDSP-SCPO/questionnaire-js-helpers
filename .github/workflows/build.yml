name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build library
        run: yarn build:prod
